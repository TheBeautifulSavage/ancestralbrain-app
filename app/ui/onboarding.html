<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ancestral Brain — Producer Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .app-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
    }

    .app-subtitle {
      font-size: 14px;
      font-weight: 500;
      color: #f5a623;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #f5a623;
      margin: 32px auto;
      opacity: 0.4;
    }

    .headline {
      font-size: 40px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .subtext {
      font-size: 16px;
      color: #999999;
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto 40px;
    }

    .cta-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #pick-folder-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      padding: 14px 24px;
      background-color: #f5a623;
      color: #000000;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
    }

    #pick-folder-btn:hover {
      background-color: #e09610;
    }

    #pick-folder-btn:active {
      transform: scale(0.98);
    }

    .hint-text {
      font-size: 12px;
      color: #555555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-title">Ancestral Brain</div>
    <div class="app-subtitle">Alpha — Producer Vault</div>

    <div class="divider"></div>

    <h1 class="headline">Pick your vault folder.</h1>
    <p class="subtext">
      Ancestral Brain will index everything in this folder — audio files,
      documents, voice memos. Nothing leaves your machine.
    </p>

    <div class="cta-wrapper">
      <button id="pick-folder-btn">Choose Folder →</button>
      <p class="hint-text">You can add more folders later in Settings.</p>
    </div>
  </div>

  <script>
    document.getElementById('pick-folder-btn').addEventListener('click', function() {
      window.__TAURI__.core.invoke('pick_folder');
    });
  </script>
</body>
</html>
